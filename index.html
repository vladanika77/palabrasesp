<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabras en Español</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky: #87CEEB;
  --sky-dark: #5ba3c9;
  --bg-grad1: #1a7abf;
  --bg-grad2: #2196d3;
  --bg-grad3: #64b8e8;
  --shadow: rgba(0,0,0,0.15);
  --letter-inactive: rgba(255,255,255,0.3);
  --letter-active: #FFD700;
  --letter-active-glow: #FFA500;
  --letter-done: #90EE90;
  --letter-done-glow: #32CD32;
  --letter-flash: #FF6B6B;
}

body {
  font-family: 'Fredoka One', cursive;
  background: linear-gradient(160deg, var(--bg-grad1) 0%, var(--bg-grad2) 50%, var(--bg-grad3) 100%);
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ========== CLOUDS ========== */
.cloud {
  position: fixed;
  background: white;
  border-radius: 50px;
  opacity: 0.85;
  pointer-events: none;
  z-index: 0;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
.cloud-1 { width: 160px; height: 55px; top: 8%; animation: drift1 28s linear infinite; }
.cloud-1::before { width: 80px; height: 80px; top: -40px; left: 20px; }
.cloud-1::after { width: 55px; height: 55px; top: -25px; left: 75px; }
.cloud-2 { width: 110px; height: 40px; top: 20%; animation: drift2 38s linear infinite; opacity: 0.7; }
.cloud-2::before { width: 55px; height: 55px; top: -28px; left: 15px; }
.cloud-2::after { width: 40px; height: 40px; top: -18px; left: 55px; }
.cloud-3 { width: 200px; height: 65px; top: 60%; animation: drift3 45s linear infinite; opacity: 0.6; }
.cloud-3::before { width: 90px; height: 90px; top: -45px; left: 25px; }
.cloud-3::after { width: 70px; height: 70px; top: -35px; left: 100px; }
.cloud-4 { width: 130px; height: 45px; top: 75%; animation: drift1 33s linear infinite reverse; opacity: 0.75; }
.cloud-4::before { width: 65px; height: 65px; top: -33px; left: 18px; }
.cloud-4::after { width: 50px; height: 50px; top: -22px; left: 65px; }

@keyframes drift1 { from { left: -200px; } to { left: 110%; } }
@keyframes drift2 { from { left: 110%; } to { left: -200px; } }
@keyframes drift3 { from { left: -250px; } to { left: 110%; } }

/* ========== SCREENS ========== */
.screen {
  display: none;
  position: relative;
  z-index: 10;
  width: 100%;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.screen.active { display: flex; }

/* ========== LIBRARY SCREEN ========== */
#libraryScreen {
  padding: 20px;
}

.library-title {
  font-size: 3rem;
  color: white;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  margin-bottom: 30px;
  letter-spacing: 2px;
}
.library-title span { margin-right: 15px; }

.categories-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  max-width: 900px;
  width: 100%;
}

.category-card {
  background: white;
  border-radius: 20px;
  padding: 18px 10px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 6px 0 rgba(0,0,0,0.2);
  user-select: none;
}
.category-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 0 rgba(0,0,0,0.2);
}
.category-card:active {
  transform: translateY(2px);
  box-shadow: 0 3px 0 rgba(0,0,0,0.2);
}
.category-card.locked {
  opacity: 0.5;
  cursor: not-allowed;
  background: rgba(255,255,255,0.6);
}
.category-card.locked:hover { transform: none; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }

.card-icon { font-size: 2rem; line-height: 1; }
.card-name {
  font-size: 0.65rem;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-align: center;
  color: white;
  line-height: 1.2;
}

/* Category colors */
.cat-0  { background: #FF6B6B; box-shadow: 0 6px 0 #c94f4f; } .cat-0 .card-name { color: white; }
.cat-1  { background: #FF9F43; box-shadow: 0 6px 0 #c97a2e; }
.cat-2  { background: #FFC312; box-shadow: 0 6px 0 #c99600; }
.cat-3  { background: #48DBFB; box-shadow: 0 6px 0 #2aabb6; }
.cat-4  { background: #FF84C7; box-shadow: 0 6px 0 #c95fa0; }
.cat-5  { background: #5F7ADB; box-shadow: 0 6px 0 #3d5ab6; }
.cat-6  { background: #A55EEA; box-shadow: 0 6px 0 #7d3db5; }
.cat-7  { background: #26de81; box-shadow: 0 6px 0 #1aac62; }
.cat-8  { background: #20bf6b; box-shadow: 0 6px 0 #178c50; }
.cat-9  { background: #FF6B9D; box-shadow: 0 6px 0 #c94f7a; }
.cat-10 { background: #FC5C65; box-shadow: 0 6px 0 #c43a42; }
.cat-11 { background: #45AAF2; box-shadow: 0 6px 0 #2d7fba; }
.cat-12 { background: #4B6584; box-shadow: 0 6px 0 #2f4258; }
.cat-13 { background: #F7B731; box-shadow: 0 6px 0 #c48f1e; }
.cat-14 { background: #FC5C65; box-shadow: 0 6px 0 #c43a42; }
.cat-15 { background: #26de81; box-shadow: 0 6px 0 #1aac62; }
.cat-16 { background: #FD9644; box-shadow: 0 6px 0 #c97030; }
.cat-17 { background: #45AAF2; box-shadow: 0 6px 0 #2d7fba; }
.cat-18 { background: #A55EEA; box-shadow: 0 6px 0 #7d3db5; }
.cat-19 { background: #26de81; box-shadow: 0 6px 0 #1aac62; }
.cat-20 { background: #FF6B6B; box-shadow: 0 6px 0 #c94f4f; }
.cat-21 { background: #5F7ADB; box-shadow: 0 6px 0 #3d5ab6; }
.cat-22 { background: #FFC312; box-shadow: 0 6px 0 #c99600; }
.cat-23 { background: rgba(255,255,255,0.3); box-shadow: 0 6px 0 rgba(0,0,0,0.1); }
.cat-24 { background: rgba(255,255,255,0.3); box-shadow: 0 6px 0 rgba(0,0,0,0.1); }

/* ========== GAME SCREEN ========== */
#gameScreen {
  padding: 20px;
}

.game-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  z-index: 100;
}

.btn-back {
  background: white;
  border: none;
  border-radius: 30px;
  padding: 10px 20px;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  color: #333;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  transition: transform 0.1s;
}
.btn-back:hover { transform: translateY(-2px); }
.btn-back:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

.game-title {
  font-size: 1.4rem;
  color: white;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-pause {
  background: white;
  border: none;
  border-radius: 50%;
  width: 46px; height: 46px;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  transition: transform 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.btn-pause:hover { transform: translateY(-2px); }

/* Word area */
.word-area {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: center;
  margin-top: 80px;
}

.letter-tile {
  width: 200px; height: 200px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7.5rem;
  font-family: 'Fredoka One', cursive;
  color: #0a3d6b;
  background: white;
  box-shadow: 0 8px 0 rgba(0,0,0,0.25), 0 0 0 4px rgba(255,255,255,0.5);
  transition: background 0.2s, transform 0.1s, box-shadow 0.1s;
  border: 5px solid transparent;
  user-select: none;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
}

.letter-tile.inactive {
  background: rgba(255,255,255,0.92);
  color: #1a5f8f;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
  border-color: rgba(255,255,255,0.9);
  box-shadow: 0 8px 0 rgba(0,0,0,0.2);
}

.letter-tile.active {
  background: #FFD700;
  color: #7a3800;
  border-color: #FF8C00;
  box-shadow: 0 8px 0 #b35e00, 0 0 40px #FFD700, 0 0 80px rgba(255,165,0,0.5);
  animation: breathe 1.2s ease-in-out infinite;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
}

.letter-tile.done {
  background: #00C853;
  color: white;
  border-color: #00952e;
  box-shadow: 0 8px 0 #006622, 0 0 20px rgba(0,200,83,0.4);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
}

.letter-tile.error {
  background: #FF1744 !important;
  color: white !important;
  border-color: #B71C1C !important;
  box-shadow: 0 8px 0 #7f0000, 0 0 30px rgba(255,23,68,0.6) !important;
  animation: shake 0.4s ease-in-out !important;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.2) !important;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); box-shadow: 0 6px 0 #c47f00, 0 0 25px #FFD700; }
  50% { transform: scale(1.06); box-shadow: 0 8px 0 #c47f00, 0 0 40px #FFD700; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px) rotate(-2deg); }
  40% { transform: translateX(8px) rotate(2deg); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* Progress dots */
.progress-dots {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 30px;
}
.dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: background 0.3s;
}
.dot.current { background: #FFD700; }
.dot.completed { background: white; }

/* ========== PICTURE SCREEN ========== */
#pictureScreen {
  padding: 20px;
}

.picture-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.word-display {
  font-size: 3rem;
  color: white;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  letter-spacing: 3px;
}

.picture-frame {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 0;
  overflow: hidden;
}

.picture-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-size: cover;
  background-position: center;
  filter: blur(20px) brightness(0.7);
  transform: scale(1.1);
}

.picture-frame img {
  position: relative;
  z-index: 1;
  max-width: 90vw;
  max-height: 75vh;
  object-fit: contain;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  margin-top: 60px;
}

.picture-placeholder {
  font-size: 6rem;
  opacity: 0.5;
}

.picture-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 10;
  pointer-events: none;
}

.word-display {
  font-size: 3.5rem;
  color: white;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.5);
  letter-spacing: 4px;
  margin-top: 80px;
}

.btn-next {
  pointer-events: all;
  background: white;
  border: none;
  border-radius: 30px;
  padding: 14px 35px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.2rem;
  color: #1a5f8f;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,0.3);
  transition: transform 0.1s;
  animation: pulse-btn 1.5s ease-in-out infinite;
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
  50% { box-shadow: 0 6px 20px rgba(255,255,255,0.4); }
}

/* ========== FIREWORKS SCREEN ========== */
#fireworksScreen {
  background: rgba(0,0,0,0.85);
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 200;
}

.fireworks-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 30px;
}

.bravo-text {
  font-size: 5rem;
  color: #FFD700;
  text-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500;
  animation: glow-text 1s ease-in-out infinite alternate;
  text-align: center;
}

@keyframes glow-text {
  from { text-shadow: 0 0 20px #FFD700, 0 0 40px #FFA500; }
  to { text-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500, 0 0 120px #FF6B00; }
}

canvas#fireworksCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.btn-library {
  background: #FFD700;
  border: none;
  border-radius: 30px;
  padding: 16px 40px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  color: #333;
  cursor: pointer;
  box-shadow: 0 6px 0 #c47f00;
  transition: transform 0.1s;
  position: relative;
  z-index: 10;
}
.btn-library:hover { transform: translateY(-3px); }

/* ========== VOLUME CONTROLS ========== */
.volume-controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
  pointer-events: none;
}

.volume-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: all;
}

.volume-icon { font-size: 1.3rem; color: rgba(255,255,255,0.8); }

input[type=range].volume-slider {
  writing-mode: vertical-lr;
  direction: rtl;
  width: 30px;
  height: 120px;
  cursor: pointer;
  accent-color: white;
  background: transparent;
}

/* ========== PAUSE OVERLAY ========== */
#pauseOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 150;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}
#pauseOverlay.active { display: flex; }
.pause-text {
  font-size: 4rem;
  color: white;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
}
.btn-resume {
  background: #FFD700;
  border: none;
  border-radius: 30px;
  padding: 14px 40px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: #333;
  cursor: pointer;
  box-shadow: 0 6px 0 #c47f00;
}
</style>
</head>
<body>

<!-- Clouds -->

<!-- ========== LIBRARY SCREEN ========== -->
<div id="libraryScreen" class="screen active">
  <h1 class="library-title"><span>📚</span> BIBLIOTECA</h1>
  <div class="categories-grid" id="categoriesGrid"></div>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="gameScreen" class="screen">

</div>

<!-- ========== FIREWORKS SCREEN ========== -->
<div id="fireworksScreen" class="screen">
  <canvas id="fireworksCanvas"></canvas>

</div>

<!-- Volume controls -->
<div class="volume-controls" id="volumeControls">
  <div class="volume-group">
    <span class="volume-icon">🎵</span>
    <input type="range" class="volume-slider" id="musicVolume" min="0" max="100" value="40" oninput="setMusicVolume(this.value)">
  </div>
  <div class="volume-group">
    <span class="volume-icon">🔊</span>
    <input type="range" class="volume-slider" id="voiceVolume" min="0" max="100" value="100" oninput="setVoiceVolume(this.value)">
  </div>
</div>

<!-- Pause overlay -->
<div id="pauseOverlay">
  <div class="pause-text">⏸ PAUSA</div>
  <button class="btn-resume" onclick="togglePause()">▶ CONTINUAR</button>
</div>

let currentWordIndex = 0;
let currentLetterIndex = 0;
let isPaused = false;
let musicVolume = 0.4;
let voiceVolume = 1.0;
let audioCtx = null;
let musicGain = null;
let musicInterval = null;

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
  buildLibrary();
  initAudio();
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
});

// ========== LIBRARY ==========
function buildLibrary() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach((cat, i) => {
    const card = document.createElement('div');
    card.className = `category-card cat-${i} ${cat.locked ? 'locked' : ''}`;
    card.innerHTML = `<div class="card-icon">${cat.icon}</div><div class="card-name">${cat.name}</div>`;
    if (!cat.locked) card.onclick = () => startCategory(i);
    grid.appendChild(card);
  });
}

function startCategory(index) {
  currentCategory = CATEGORIES[index];
  if (!currentCategory.words.length) return;
  currentWords = [...currentCategory.words].sort(() => Math.random() - 0.5);
  currentWordIndex = 0;

  document.getElementById('gameTitle').innerHTML = `${currentCategory.icon} ${currentCategory.name}`;
  document.getElementById('pictureTitle').innerHTML = `${currentCategory.icon} ${currentCategory.name}`;

  showScreen('gameScreen');
  buildProgressDots();
  loadWord();
}

// ========== GAME ==========
function buildProgressDots() {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  currentWords.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' current' : '');
    dot.id = `dot-${i}`;
    dots.appendChild(dot);
  });
}

function loadWord() {
  const word = currentWords[currentWordIndex];
  currentLetterIndex = 0;

  // Update dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i < currentWordIndex ? ' completed' : i === currentWordIndex ? ' current' : '');
  });

  // Build tiles
  const area = document.getElementById('wordArea');
  area.innerHTML = '';
  word.split('').forEach((letter, i) => {
    const tile = document.createElement('div');
    tile.className = 'letter-tile ' + (i === 0 ? 'active' : 'inactive');
    tile.id = `tile-${i}`;
    tile.textContent = letter;
    area.appendChild(tile);
  });

  // Speak word then first letter
  setTimeout(() => {
    speakText(word);
    setTimeout(() => speakText(word[0]), 1200);
  }, 300);
}

function onKeyDown(e) {
  if (isPaused) return;
  const screen = document.querySelector('.screen.active');
  if (!screen || screen.id !== 'gameScreen') return;

  // Space on picture screen handled separately
  const key = e.key.toUpperCase();
  if (key.length !== 1 && key !== ' ') return;

  const word = currentWords[currentWordIndex];
  const expectedLetter = word[currentLetterIndex];

  if (key === expectedLetter || (key === ' ' && expectedLetter === ' ')) {
    // Correct!
    const tile = document.getElementById(`tile-${currentLetterIndex}`);
    tile.className = 'letter-tile done';
    currentLetterIndex++;

    if (currentLetterIndex >= word.length) {
      // Word complete!
      setTimeout(() => {
        speakText(word);
        setTimeout(() => showPicture(word), 800);
      }, 200);
    } else {
      const nextTile = document.getElementById(`tile-${currentLetterIndex}`);
      nextTile.className = 'letter-tile active';
      speakText(word[currentLetterIndex]);
    }
  } else {
    // Wrong!
    const tile = document.getElementById(`tile-${currentLetterIndex}`);
    tile.className = 'letter-tile error';
    playErrorSound();
    setTimeout(() => { tile.className = 'letter-tile active'; }, 450);
  }
}

function onKeyUp(e) {
  if (e.code === 'Space') {
    const screen = document.querySelector('.screen.active');
    if (screen && screen.id === 'pictureScreen') {
      nextWord();
    }
  }
}

// ========== PICTURE ==========
function showPicture(word) {
  document.getElementById('pictureWord').textContent = word;

  const frame = document.getElementById('pictureFrame');
  const imgPath = `images/${word.toLowerCase()}.jpg`;

  const img = new Image();
  img.onload = () => {
    frame.innerHTML = `
      <div class="picture-bg" style="background-image:url('${imgPath}')"></div>
      <img src="${imgPath}" alt="${word}">
    `;
  };
  img.onerror = () => {
    frame.innerHTML = `<div class="picture-placeholder">${currentCategory.icon}</div>`;
  };
  img.src = imgPath;

  showScreen('pictureScreen');
  speakText(word);
}

function nextWord() {
  currentWordIndex++;
  if (currentWordIndex >= currentWords.length) {
    showFireworks();
  } else {
    showScreen('gameScreen');
    loadWord();
  }
}

// ========== FIREWORKS ==========
function showFireworks() {
  showScreen('fireworksScreen');
  speakText('¡Muy bien! ¡Excelente!');
  startFireworks();
}

function startFireworks() {
  const canvas = document.getElementById('fireworksCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];

  function createBurst(x, y) {
    const colors = ['#FFD700','#FF6B6B','#48DBFB','#FF84C7','#26de81','#FFC312','#A55EEA','#FF9F43','#ffffff','#FF1744','#00E5FF'];
    for (let i = 0; i < 120; i++) {
      const angle = (Math.PI * 2 / 120) * i + Math.random() * 0.2;
      const speed = 4 + Math.random() * 10;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,
        size: 5 + Math.random() * 7
      });
    }
  }

  let frame = 0;
  function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (frame % 25 === 0) {
      createBurst(
        100 + Math.random() * (canvas.width - 200),
        100 + Math.random() * (canvas.height * 0.6)
      );
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.life -= 0.018;
      p.vx *= 0.99;

      if (p.life <= 0) { particles.splice(i, 1); continue; }

      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    frame++;
    if (document.getElementById('fireworksScreen').classList.contains('active')) {
      requestAnimationFrame(animate);
    }
  }
  animate();
}

// ========== NAVIGATION ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToLibrary() {
  showScreen('libraryScreen');
  isPaused = false;
  document.getElementById('pauseOverlay').classList.remove('active');
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pauseOverlay').classList.toggle('active', isPaused);
  document.getElementById('pauseBtn').textContent = isPaused ? '▶' : '⏸';
  if (musicGain) musicGain.gain.value = isPaused ? 0 : musicVolume;
}

// ========== AUDIO ==========
function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = musicVolume;
    musicGain.connect(audioCtx.destination);
    playMusic();
  } catch(e) {}
}

function playMusic() {
  // Simple melody: C D E G A pattern
  const notes = [261.6, 293.7, 329.6, 392, 440, 392, 329.6, 293.7];
  let noteIndex = 0;

  function playNote() {
    if (!audioCtx || isPaused) { setTimeout(playNote, 500); return; }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(musicGain);
    osc.type = 'sine';
    osc.frequency.value = notes[noteIndex % notes.length];
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
    noteIndex++;
    setTimeout(playNote, 500);
  }
  setTimeout(playNote, 1000);
}

function playErrorSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.3 * voiceVolume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'es-ES';
  utt.rate = 0.85;
  utt.volume = voiceVolume;

  // Try to use Spanish voice
  const voices = window.speechSynthesis.getVoices();
  const spanishVoice = voices.find(v => v.lang.startsWith('es'));
  if (spanishVoice) utt.voice = spanishVoice;

  window.speechSynthesis.speak(utt);
}

// Load voices
window.speechSynthesis && window.speechSynthesis.addEventListener('voiceschanged', () => {});

function setMusicVolume(val) {
  musicVolume = val / 100;
  if (musicGain && !isPaused) musicGain.gain.value = musicVolume;
}

function setVoiceVolume(val) {
  voiceVolume = val / 100;
}

// Unlock audio on first click
document.addEventListener('click', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });
</script>
